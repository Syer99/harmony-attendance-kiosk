<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Staff Attendance Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    
    <style>
        :root {
            --color-in-start: #34d399; /* Green Gradient Start */
            --color-in-end: #059669;   /* Green Gradient End */
            --color-out-start: #60a5fa; /* Blue Gradient Start */
            --color-out-end: #2563eb;   /* Blue Gradient End */
            --color-danger: #ef4444; 
            --text-main: #1e293b;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff; /* PURE WHITE BACKGROUND */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            overflow: hidden;
        }

        .screen {
            display: none;
            width: 100%;
            max-width: 480px;
            height: 100%;
            padding: 25px; /* Lebih ruang tepi */
            box-sizing: border-box;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); /* Smooth animation */
            background: #ffffff; /* Ensure screen is pure white too */
            /* Removed box-shadow for seamless white look */
        }

        .active-screen {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .clean-panel {
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            max-height: 95vh;
            padding: 10px 0; /* Adjust padding */
        }

        .company-logo {
            max-width: 140px; /* Sedikit kecilkan logo */
            max-height: 90px;
            margin-bottom: 15px;
            object-fit: contain;
            align-self: center;
        }

        /* --- REAL-TIME CLOCK STYLES --- */
        .clock-container {
            margin-bottom: 30px;
        }
        .clock-time {
            font-size: 48px; /* Sedikit kecilkan jam supaya tak terlalu dominan */
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.1;
            letter-spacing: -0.5px;
        }
        .clock-date {
            font-size: 14px;
            color: #64748b;
            font-weight: 500;
            margin-top: 5px;
        }

        h2 { margin-top: 0; font-weight: 600; font-size: 22px;}
        p { color: #64748b; margin-bottom: 25px; font-size: 15px;}

        /* --- NEW PROFESSIONAL BUTTONS --- */
        .btn-main {
            width: 100%;
            /* Padding yang lebih kemas, tak terlalu tebal */
            padding: 18px 24px;
            margin: 12px 0; /* Jarak antara butang */
            border: none;
            border-radius: 16px;
            font-size: 18px; /* Font size sederhana */
            font-weight: 600;
            color: white;
            cursor: pointer;
            /* Animasi smooth */
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Gradient & Modern Shadow untuk IN */
        .btn-in {
            background: linear-gradient(135deg, var(--color-in-start) 0%, var(--color-in-end) 100%);
            box-shadow: 0 10px 20px -5px rgba(5, 150, 105, 0.4);
        }

        /* Gradient & Modern Shadow untuk OUT */
        .btn-out {
            background: linear-gradient(135deg, var(--color-out-start) 0%, var(--color-out-end) 100%);
            box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4);
        }

        /* Hover Effect - Butang Terangkat & Bayang Makin Terang */
        .btn-main:hover {
            transform: translateY(-3px);
        }
        .btn-in:hover { box-shadow: 0 15px 30px -5px rgba(5, 150, 105, 0.6); }
        .btn-out:hover { box-shadow: 0 15px 30px -5px rgba(37, 99, 235, 0.6); }

        /* Click Effect - Butang Tenggelam Sedikit */
        .btn-main:active {
            transform: scale(0.98) translateY(0);
            box-shadow: 0 5px 10px -5px rgba(0,0,0,0.2);
        }

        /* --- NAME GRID --- */
        .name-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 10px;
            overflow-y: auto;
            padding: 5px;
            max-height: 55vh;
        }

        .btn-name {
            background: #ffffff;
            border: 1px solid #e2e8f0; /* Lighter border */
            padding: 15px 10px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-main);
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03); /* Sangat subtle shadow */
        }

        .btn-name:active, .btn-name:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* --- CAMERA & OTHER BUTTONS --- */
        #video-container {
            width: 260px; /* Sedikit kecilkan */
            height: 260px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 25px;
            border: 4px solid #f1f5f9;
            background: #000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { display: none; }

        .btn-snap {
            background: var(--text-main);
            color: white; border: none; padding: 16px 35px; border-radius: 30px; /* Adjust padding */
            font-size: 16px; font-weight: 600; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15); transition: all 0.2s;
        }
        .btn-snap:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .btn-snap:active { transform: scale(0.98); }

        .btn-back {
            background: transparent; border: none; color: #94a3b8;
            font-size: 15px; margin-top: 20px; cursor: pointer; text-decoration: none; /* Remove underline default */
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .btn-back:hover { color: var(--text-main); }

        .btn-admin-trigger {
            position: absolute; bottom: 20px; right: 20px; width: 45px; height: 45px;
            background: white; border: 1px solid #e2e8f0; border-radius: 50%;
            color: #94a3b8; font-size: 20px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .btn-admin-trigger:hover { box-shadow: 0 6px 15px rgba(0,0,0,0.1); color: var(--text-main); }
        .btn-admin-trigger:active { transform: scale(0.9); }

        /* --- DASHBOARD ADMIN STYLES --- */
        .dash-cards {
            display: flex; gap: 12px; margin-bottom: 25px;
        }
        .dash-card {
            flex: 1; background: #fff; border: 1px solid #f1f5f9; border-radius: 16px; /* Rounder corners */
            padding: 15px 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.03); transition: all 0.2s;
        }
        .dash-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .dash-card h3 { margin: 0; font-size: 26px; font-weight: 700; }
        .dash-card p { margin: 5px 0 0; font-size: 12px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;}
        
        .dash-total h3 { color: var(--text-main); }
        .dash-in h3 { background: linear-gradient(135deg, var(--color-in-start), var(--color-in-end)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .dash-out h3 { color: #cbd5e1; }

        .admin-list {
            text-align: left; overflow-y: auto; max-height: 35vh; margin-bottom: 15px;
            border: 1px solid #f1f5f9; border-radius: 12px; padding: 5px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .admin-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 15px; border-bottom: 1px solid #f1f5f9;
        }
        .admin-item:last-child { border-bottom: none; }
        .btn-delete {
            background: #fee2e2; color: var(--color-danger); border: none;
            padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s;
        }
        .btn-delete:hover { background: #fecaca; }
        .admin-inputs { display: flex; gap: 10px; margin-bottom: 15px; }
        .admin-inputs input {
            flex: 1; padding: 12px 15px; border: 1px solid #e2e8f0; border-radius: 10px; font-family: 'Poppins'; outline: none; transition: border 0.2s;
        }
        .admin-inputs input:focus { border-color: var(--color-out-end); }
        .btn-add { background: var(--text-main); color: white; border: none; padding: 0 25px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: all 0.2s;}
        .btn-add:hover { opacity: 0.9; transform: translateY(-1px);}
        .btn-sheet { background: linear-gradient(135deg, var(--color-in-start), var(--color-in-end)); color: white; width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; box-shadow: 0 5px 15px rgba(5, 150, 105, 0.2);}
        .btn-sheet:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(5, 150, 105, 0.4); }
    </style>
</head>
<body>

    <div id="screen-main" class="screen active-screen">
        <div class="clean-panel">
            <img src="harmony_logo.png" alt="Harmony Logo" class="company-logo" id="company-logo">
            
            <div class="clock-container">
                <div class="clock-time" id="realtime-clock">00:00 AM</div>
                <div class="clock-date" id="realtime-date">Loading date...</div>
            </div>

            <button class="btn-main btn-in" onclick="selectType('IN')">
                <span>CLOCK IN</span>
            </button>
            <button class="btn-main btn-out" onclick="selectType('OUT')">
                <span>CLOCK OUT</span>
            </button>
        </div>
        <button class="btn-admin-trigger" onclick="requestPin()">⚙️</button>
    </div>

    <div id="screen-names" class="screen">
        <div class="clean-panel">
            <h2 id="type-title">Select Name</h2>
            <div class="name-grid" id="name-list"></div>
            <button class="btn-back" onclick="showScreen('screen-main')">← Cancel</button>
        </div>
    </div>

    <div id="screen-camera" class="screen">
        <div class="clean-panel">
            <h2 id="staff-name-title">Staff Name</h2>
            <p>Please look at the camera</p>
            
            <div id="video-container">
                <video id="video" autoplay playsinline></video>
            </div>
            <canvas id="canvas"></canvas>
            
            <button class="btn-snap" onclick="takeSnapshot()">SNAP & SUBMIT</button>
            <button class="btn-back" onclick="stopCamera(); showScreen('screen-names')">← Back</button>
        </div>
    </div>

    <div id="screen-admin" class="screen">
        <div class="clean-panel">
            <h2>HR Dashboard</h2>
            
            <div class="dash-cards">
                <div class="dash-card dash-total">
                    <h3 id="stat-total">0</h3>
                    <p>Total Staff</p>
                </div>
                <div class="dash-card dash-in">
                    <h3 id="stat-in">0</h3>
                    <p>Present</p>
                </div>
                <div class="dash-card dash-out">
                    <h3 id="stat-out">0</h3>
                    <p>Absent</p>
                </div>
            </div>
            
            <div class="admin-list" id="admin-employee-list"></div>

            <div class="admin-inputs">
                <input type="text" id="new-employee-name" placeholder="New Staff Name..." autocomplete="off">
                <button class="btn-add" onclick="addEmployee()">Add</button>
            </div>

            <button class="btn-sheet" onclick="openSpreadsheet()">📊 Open HR Sheets</button>
            <button class="btn-back" onclick="showScreen('screen-main')">← Exit Dashboard</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. SETTINGS 
        // ==========================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwwB5JJ9RHaNw0n8xP_Y0AHbHqoDNIsXpI-4xfCYqWRgOjuP5Ot3-6kjBNptYeAaoDF/exec";
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/1zigo7yXkB3CzQRFCxIQTC2KQaTXFQXaYpN4m3xdWZmA/edit?usp=sharing"; 
        const ADMIN_PIN = "123456"; 

        // ==========================================
        // 2. ISLAMIC QUOTES ARRAYS
        // ==========================================
        const quotesIn = [
            "“Begin gently, with Bismillah. May Allah bless your effort today.”",
            "“May your work today be filled with ease and barakah.”",
            "“Every sincere effort, no matter how small, is seen by Allah.”",
            "“Start with a pure intention, and let Allah handle the rest.”",
            "“Dan katakanlah: Beramallah kamu, maka Allah akan melihat amalan kamu.”<br><span style='font-size:12px; font-weight:600; color:#94a3b8;'>— Qur'an 9:105</span>",
            "“Sesungguhnya Allah mencintai apabila seseorang melakukan sesuatu pekerjaan, dia melakukannya dengan itqan.”<br><span style='font-size:12px; font-weight:600; color:#94a3b8;'>— Sahih al-Jami' 1880</span>"
        ];

        const quotesOut = [
            "“Alhamdulillah for today. May Allah accept your effort.”",
            "“Rest knowing that Allah sees your sincerity.”",
            "“You have done your part; leave the results to Allah.”",
            "“End the day with gratitude, and peace will follow.”",
            "“Sesungguhnya bersama kesulitan itu ada kemudahan.”<br><span style='font-size:12px; font-weight:600; color:#94a3b8;'>— Qur'an 94:6</span>",
            "“Berikanlah upah kepada pekerja sebelum kering peluhnya.”<br><span style='font-size:12px; font-weight:600; color:#94a3b8;'>— Sunan Ibn Majah 2443</span>"
        ];

        // ==========================================
        // 3. REAL TIME CLOCK FUNCTION
        // ==========================================
        function startClock() {
            setInterval(() => {
                const now = new Date();
                const timeOptions = { hour: '2-digit', minute: '2-digit', hour12: true };
                const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                
                document.getElementById('realtime-clock').innerText = now.toLocaleTimeString('en-US', timeOptions);
                document.getElementById('realtime-date').innerText = now.toLocaleDateString('en-US', dateOptions);
            }, 1000);
        }

        // ==========================================
        // 4. DATA, STATUS & OFFLINE QUEUE
        // ==========================================
        const defaultEmployees = ["EN TALIB", "EN ABID", "AINA", "IZZLAN", "FAKHRI", "HAJAR", "AIMAN"];
        let employees = [];
        let employeeStatus = {}; 
        let offlineQueue = [];
        
        function loadData() {
            employees = JSON.parse(localStorage.getItem('harmony_employees')) || [...defaultEmployees];
            employeeStatus = JSON.parse(localStorage.getItem('harmony_status')) || {};
            offlineQueue = JSON.parse(localStorage.getItem('harmony_offline_queue')) || [];
            saveData();
        }

        function saveData() {
            localStorage.setItem('harmony_employees', JSON.stringify(employees));
            localStorage.setItem('harmony_status', JSON.stringify(employeeStatus));
            localStorage.setItem('harmony_offline_queue', JSON.stringify(offlineQueue));
            renderNameGrid();
            renderAdminList();
        }

        // ==========================================
        // 5. UI RENDERING & CAMERA
        // ==========================================
        let currentType = "", currentStaff = "", videoStream = null;

        window.onload = () => { 
            startClock();
            loadData(); 
            checkOfflineQueue(); 
            window.addEventListener('online', checkOfflineQueue); 
        };

        function renderNameGrid() {
            const grid = document.getElementById("name-list");
            grid.innerHTML = "";
            employees.forEach(name => {
                const btn = document.createElement("button");
                btn.className = "btn-name";
                btn.innerText = name;
                btn.onclick = () => selectStaff(name);
                grid.appendChild(btn);
            });
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
        }

        function selectType(type) {
            currentType = type;
            document.getElementById("type-title").innerText = `Clock ${type} - Select Name`;
            document.getElementById("video-container").style.borderColor = type === 'IN' ? 'var(--color-in-end)' : 'var(--color-out-end)';
            showScreen('screen-names');
        }

        function selectStaff(name) {
            currentStaff = name;
            document.getElementById("staff-name-title").innerText = `${currentStaff} (${currentType})`;
            showScreen('screen-camera');
            startCamera();
        }

        async function startCamera() {
            const video = document.getElementById('video');
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                video.srcObject = videoStream;
            } catch (err) { Swal.fire('Camera Error', 'Please allow camera access in your browser settings.', 'error'); }
        }

        function stopCamera() { if (videoStream) videoStream.getTracks().forEach(track => track.stop()); }

        function takeSnapshot() {
            const canvas = document.getElementById('canvas'), video = document.getElementById('video');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            stopCamera();
            submitData(canvas.toDataURL('image/jpeg', 0.8));
        }

        // ==========================================
        // 6. SEND DATA & SYNC
        // ==========================================
        function submitData(imageBase64) {
            const payload = { staffName: currentStaff, type: currentType, imageBase64: imageBase64, timestamp: new Date().toISOString() };

            if (!navigator.onLine) {
                offlineQueue.push(payload);
                updateLiveStatus(currentStaff, currentType);
                showSuccessPopup("Disimpan (Offline)", "Data akan dihantar bila internet pulih.");
                return;
            }

            Swal.fire({ title: 'Uploading Data...', html: '<lottie-player src="https://assets8.lottiefiles.com/packages/lf20_b88nh30c.json" background="transparent" speed="1" style="width: 100px; height: 100px; margin: auto;" loop autoplay></lottie-player>', allowOutsideClick: false, showConfirmButton: false });

            fetch(SCRIPT_URL, {
                method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
            }).then(() => {
                updateLiveStatus(currentStaff, currentType);
                const quoteList = currentType === 'IN' ? quotesIn : quotesOut;
                const randomQuote = quoteList[Math.floor(Math.random() * quoteList.length)];
                showSuccessPopup("Success!", `Record for <b>${currentStaff}</b> saved.<hr style="border:0; border-top:1px dashed #cbd5e1; margin:15px 0;"><p style='color:#475569; font-style:italic; font-size:14px;'>${randomQuote}</p>`);
            }).catch(() => {
                offlineQueue.push(payload);
                updateLiveStatus(currentStaff, currentType);
                showSuccessPopup("Disimpan (Offline)", "Ralat pelayan. Data disimpan sementara.");
            });
        }

        function updateLiveStatus(name, type) {
            employeeStatus[name] = { status: type }; 
            saveData();
        }

        function showSuccessPopup(title, htmlContent) {
            Swal.fire({ html: `<lottie-player src="https://assets2.lottiefiles.com/packages/lf20_jbrw3hcz.json" background="transparent" speed="1" style="width: 130px; height: 130px; margin: auto;" autoplay></lottie-player><h2 style="margin-top:0;">${title}</h2>${htmlContent}`, timer: 5000, timerProgressBar: true, showConfirmButton: false }).then(() => showScreen('screen-main'));
        }

        function checkOfflineQueue() {
            if (navigator.onLine && offlineQueue.length > 0) {
                offlineQueue.forEach((data, index) => {
                    fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) })
                    .then(() => { offlineQueue.splice(index, 1); saveData(); });
                });
            }
        }

        // ==========================================
        // 7. DASHBOARD ADMIN LOGIC
        // ==========================================
        function requestPin() {
            Swal.fire({ title: 'HR Admin Login', input: 'password', inputAttributes: { inputmode: 'numeric', maxlength: 6, placeholder: 'Enter 6-digit PIN' }, showCancelButton: true, confirmButtonText: 'Login', confirmButtonColor: '#1e293b' })
            .then((result) => {
                if (result.value === ADMIN_PIN) { showScreen('screen-admin'); renderAdminList(); } 
                else if (result.value) { Swal.fire('Access Denied', 'Incorrect PIN entered.', 'error'); }
            });
        }

        function renderAdminList() {
            const listDiv = document.getElementById("admin-employee-list");
            listDiv.innerHTML = "";
            
            let totalIn = 0;
            let totalOut = 0;

            employees.forEach((name, index) => {
                const state = employeeStatus[name] || { status: 'OUT' };
                if (state.status === 'IN') totalIn++; else totalOut++;

                const badgeColor = state.status === 'IN' ? '#10b981' : '#94a3b8';
                const statusHtml = `<span style="color:${badgeColor}; font-size:11px; background:${state.status === 'IN'?'#dcfce7':'#f1f5f9'}; padding:3px 8px; border-radius:12px; margin-left:8px; font-weight:bold;">${state.status === 'IN' ? '🟢 IN' : '⚪ OUT'}</span>`;
                
                const item = document.createElement("div");
                item.className = "admin-item";
                item.innerHTML = `<div style="display:flex; align-items:center;"><span style="font-weight: 500;">${name}</span>${statusHtml}</div><button class="btn-delete" onclick="removeEmployee(${index})">Del</button>`;
                listDiv.appendChild(item);
            });

            // Update Quick Stats Dashboard
            document.getElementById("stat-total").innerText = employees.length;
            document.getElementById("stat-in").innerText = totalIn;
            document.getElementById("stat-out").innerText = totalOut;
        }

        function addEmployee() {
            const input = document.getElementById("new-employee-name");
            const name = input.value.trim().toUpperCase();
            if (name && !employees.includes(name)) {
                employees.push(name); saveData(); input.value = "";
                Swal.fire({icon: 'success', title: 'Added', toast: true, position: 'top-end', showConfirmButton: false, timer: 1500});
            } else if (employees.includes(name)) { Swal.fire('Error', 'Name already exists.', 'warning'); }
        }

        function removeEmployee(index) {
            Swal.fire({ title: 'Are you sure?', text: employees[index] + " will be removed.", icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'Yes, Delete' })
            .then((result) => { if (result.isConfirmed) { employees.splice(index, 1); saveData(); } });
        }

        function openSpreadsheet() { window.open(SHEET_URL, '_blank'); }
    </script>
</body>
</html>
